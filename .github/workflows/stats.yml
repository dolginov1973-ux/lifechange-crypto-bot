name: Bot stats (acquisition)

# Read-only: query the acquisition table (deep-link sources / cost-per-start) from the
# live D1. Actions -> Bot stats (acquisition) -> Run workflow. Re-runnable any time.

on:
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Resolve D1 id
        id: d1
        run: |
          DBID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="lifechange-crypto-bot") | .uuid')
          if [ -z "$DBID" ] || [ "$DBID" = "null" ]; then echo "::error::D1 not found"; exit 1; fi
          echo "dbid=$DBID" >> "$GITHUB_OUTPUT"
      - name: Inject D1 id
        run: sed -i "s|REPLACE_WITH_D1_DATABASE_ID|${{ steps.d1.outputs.dbid }}|" wrangler.toml
      - name: Query acquisition
        run: |
          echo "===== TOTAL USERS ====="
          npx wrangler d1 execute lifechange-crypto-bot --remote --command "SELECT COUNT(*) AS total_users FROM acquisition"
          echo "===== PER-SOURCE (cost-per-start basis) ====="
          npx wrangler d1 execute lifechange-crypto-bot --remote --command "SELECT source, COUNT(*) AS n, MIN(created_at) AS first_seen, MAX(created_at) AS last_seen FROM acquisition GROUP BY source ORDER BY n DESC"
          echo "===== LAST 20 STARTS ====="
          npx wrangler d1 execute lifechange-crypto-bot --remote --command "SELECT source, created_at FROM acquisition ORDER BY created_at DESC LIMIT 20"
          echo "===== FUNNEL PER USER (source -> lang -> trial -> entitlement -> paid -> warmups) ====="
          npx wrangler d1 execute lifechange-crypto-bot --remote --command "SELECT a.source, a.telegram_id, u.lang, u.last_seen_at, (SELECT COUNT(*) FROM trial_submissions t WHERE t.telegram_id=a.telegram_id) AS trials, (SELECT COUNT(*) FROM entitlements e WHERE e.telegram_id=a.telegram_id) AS ents, (SELECT COUNT(*) FROM payments p WHERE p.telegram_id=a.telegram_id AND p.status='paid') AS paid, (SELECT COUNT(*) FROM warmup_log w WHERE w.telegram_id=a.telegram_id) AS warmups FROM acquisition a LEFT JOIN users u ON u.telegram_id=a.telegram_id ORDER BY a.created_at DESC"
          echo "===== CHANNEL-CLICK THROUGH-RATE per source (bot -> public channel) ====="
          npx wrangler d1 execute lifechange-crypto-bot --remote --command "SELECT COALESCE(a.source,'(none)') AS source, COUNT(DISTINCT c.telegram_id) AS clickers, COUNT(*) AS clicks FROM channel_clicks c LEFT JOIN acquisition a ON a.telegram_id=c.telegram_id GROUP BY a.source ORDER BY clicks DESC"
